name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      branch_name: ${{ steps.metadata.outputs.branch_name }}
      commit_message: ${{ steps.metadata.outputs.commit_message }}
      commit_url: ${{ steps.metadata.outputs.commit_url }}
      short_sha: ${{ steps.metadata.outputs.short_sha }}
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect commit metadata
        id: metadata
        shell: bash
        env:
          EVENT_COMMIT_URL: ${{ github.event.head_commit.url || '' }}
          REPOSITORY_URL: ${{ github.event.repository.html_url }}
        run: |
          sha="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short=7 HEAD)"
          commit_message="$(git log -1 --pretty=%B | tr '\r\n' ' ' | sed -E 's/[[:space:]]+/ /g' | sed -E 's/^ | $//g')"
          commit_url="${EVENT_COMMIT_URL}"

          if [ -z "${commit_url}" ]; then
            commit_url="${REPOSITORY_URL}/commit/${sha}"
          fi

          {
            echo "branch_name=${GITHUB_REF_NAME}"
            echo "commit_message=${commit_message}"
            echo "commit_url=${commit_url}"
            echo "short_sha=${short_sha}"
          } >> "${GITHUB_OUTPUT}"
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
          
      - name: Install dependencies
        run: npm ci

      - name: Run validations
        run: npm run lint
        
      - name: Build
        run: npm run build
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend/dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs:
      - build
      - deploy
    if: always()
    steps:
      - name: Prepare Slack payload
        id: slack-payload
        shell: bash
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          REPOSITORY: ${{ github.repository }}
          REPOSITORY_URL: ${{ github.event.repository.html_url }}
          BRANCH_NAME: ${{ needs.build.outputs.branch_name || github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHORT_SHA: ${{ needs.build.outputs.short_sha || github.sha }}
          COMMIT_MESSAGE: ${{ needs.build.outputs.commit_message || github.event.head_commit.message || '' }}
          COMMIT_URL: ${{ needs.build.outputs.commit_url || github.event.head_commit.url || format('{0}/commit/{1}', github.event.repository.html_url, github.sha) }}
          ACTOR: ${{ github.triggering_actor || github.actor }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const env = process.env;
          const buildResult = env.BUILD_RESULT || "unknown";
          const deployResult = env.DEPLOY_RESULT || "unknown";
          const successful = buildResult === "success" && deployResult === "success";
          const status = successful ? "Despliegue correcto" : `Despliegue fallido (build: ${buildResult}, deploy: ${deployResult})`;
          const color = successful ? "good" : "danger";
          const shortSha = (env.SHORT_SHA || "").slice(0, 7) || "No disponible";

          const escapeSlack = (value, fallback = "No disponible") => {
            const text = value && String(value).trim() ? String(value).trim() : fallback;
            return text
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;");
          };

          const link = (url, label) => {
            const safeLabel = escapeSlack(label);
            return url && String(url).trim() ? `<${url}|${safeLabel}>` : safeLabel;
          };

          const payload = {
            text: `Deploy GitHub Pages: ${status} - ${env.REPOSITORY}`,
            attachments: [
              {
                color,
                blocks: [
                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text: `*Workflow:* ${link(env.RUN_URL, "Deploy GitHub Pages")}\n*Estado:* ${escapeSlack(status)}`,
                    },
                  },
                  {
                    type: "section",
                    fields: [
                      {
                        type: "mrkdwn",
                        text: `*Repositorio:*\n${link(env.REPOSITORY_URL, env.REPOSITORY)}`,
                      },
                      {
                        type: "mrkdwn",
                        text: `*Rama:*\n${escapeSlack(env.BRANCH_NAME)}`,
                      },
                      {
                        type: "mrkdwn",
                        text: `*Evento:*\n${escapeSlack(env.EVENT_NAME)}`,
                      },
                      {
                        type: "mrkdwn",
                        text: `*Ejecucion:*\n#${escapeSlack(env.RUN_NUMBER)}`,
                      },
                      {
                        type: "mrkdwn",
                        text: `*Commit:*\n${link(env.COMMIT_URL, shortSha)}`,
                      },
                      {
                        type: "mrkdwn",
                        text: `*Usuario:*\n${escapeSlack(env.ACTOR)}`,
                      },
                    ],
                  },
                  {
                    type: "section",
                    fields: [
                      {
                        type: "mrkdwn",
                        text: `*Build:*\n${escapeSlack(buildResult)}`,
                      },
                      {
                        type: "mrkdwn",
                        text: `*Deploy:*\n${escapeSlack(deployResult)}`,
                      },
                    ],
                  },
                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text: `*Mensaje del commit:*\n${escapeSlack(env.COMMIT_MESSAGE)}`,
                    },
                  },
                  {
                    type: "actions",
                    elements: [
                      {
                        type: "button",
                        text: {
                          type: "plain_text",
                          text: "Ver ejecucion",
                        },
                        url: env.RUN_URL,
                      },
                      {
                        type: "button",
                        text: {
                          type: "plain_text",
                          text: "Ver commit",
                        },
                        url: env.COMMIT_URL,
                      },
                    ],
                  },
                ],
              },
            ],
          };

          const payloadPath = path.join(env.RUNNER_TEMP, "slack-payload.json");
          fs.writeFileSync(payloadPath, JSON.stringify(payload, null, 2));
          fs.appendFileSync(env.GITHUB_OUTPUT, `payload-path=${payloadPath}\n`);
          NODE

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v4.0.0
        continue-on-error: true
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_PUBLIC_URL }}
          webhook-type: incoming-webhook
          payload-file-path: ${{ steps.slack-payload.outputs.payload-path }}
