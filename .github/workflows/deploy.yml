name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      branch_name: ${{ steps.metadata.outputs.branch_name }}
      commit_message: ${{ steps.metadata.outputs.commit_message }}
      commit_url: ${{ steps.metadata.outputs.commit_url }}
      short_sha: ${{ steps.metadata.outputs.short_sha }}
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect commit metadata
        id: metadata
        shell: bash
        env:
          EVENT_COMMIT_URL: ${{ github.event.head_commit.url || '' }}
          REPOSITORY_URL: ${{ github.event.repository.html_url }}
        run: |
          sha="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short=7 HEAD)"
          commit_message="$(git log -1 --pretty=%B | tr '\r\n' ' ' | sed -E 's/[[:space:]]+/ /g' | sed -E 's/^ | $//g')"
          commit_url="${EVENT_COMMIT_URL}"

          if [ -z "${commit_url}" ]; then
            commit_url="${REPOSITORY_URL}/commit/${sha}"
          fi

          {
            echo "branch_name=${GITHUB_REF_NAME}"
            echo "commit_message=${commit_message}"
            echo "commit_url=${commit_url}"
            echo "short_sha=${short_sha}"
          } >> "${GITHUB_OUTPUT}"
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
          
      - name: Install dependencies
        run: npm ci

      - name: Run validations
        run: npm run lint
        
      - name: Build
        run: npm run build
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend/dist'

  sonarcloud:
    name: SonarCloud status
    runs-on: ubuntu-latest
    needs:
      - build
    if: always()
    outputs:
      bugs: ${{ steps.sonar.outputs.bugs }}
      code_smells: ${{ steps.sonar.outputs.code_smells }}
      coverage: ${{ steps.sonar.outputs.coverage }}
      dashboard_url: ${{ steps.sonar.outputs.dashboard_url }}
      summary: ${{ steps.sonar.outputs.summary }}
      status: ${{ steps.sonar.outputs.status }}
      vulnerabilities: ${{ steps.sonar.outputs.vulnerabilities }}
    steps:
      - name: Query SonarCloud status
        id: sonar
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_UTILS_KEY }}
        run: |
          dashboard_url="https://sonarcloud.io/project/overview?id=${SONAR_PROJECT_KEY}"
          status="not_configured"
          summary="SonarCloud no configurado"
          coverage="No disponible"
          bugs="No disponible"
          vulnerabilities="No disponible"
          code_smells="No disponible"

          if [ -z "${SONAR_TOKEN}" ] || [ -z "${SONAR_PROJECT_KEY}" ] || [ -z "${SONAR_ORGANIZATION}" ]; then
            {
              echo "status=${status}"
              echo "summary=${summary}"
              echo "dashboard_url=${dashboard_url}"
              echo "coverage=${coverage}"
              echo "bugs=${bugs}"
              echo "vulnerabilities=${vulnerabilities}"
              echo "code_smells=${code_smells}"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          quality_response="$(curl --fail --silent --show-error -u "${SONAR_TOKEN}:" --get "https://sonarcloud.io/api/qualitygates/project_status" --data-urlencode "projectKey=${SONAR_PROJECT_KEY}" 2>/tmp/sonar-quality-error)"
          quality_exit=$?

          if [ "${quality_exit}" -ne 0 ]; then
            status="unavailable"
            summary="No se pudo consultar SonarCloud"
          else
            status="$(echo "${quality_response}" | jq -r '.projectStatus.status // "unknown"')"
            summary="Quality Gate: ${status}"
          fi

          measures_response="$(curl --fail --silent --show-error -u "${SONAR_TOKEN}:" --get "https://sonarcloud.io/api/measures/component" --data-urlencode "component=${SONAR_PROJECT_KEY}" --data-urlencode "metricKeys=coverage,bugs,vulnerabilities,code_smells" 2>/tmp/sonar-measures-error)"
          measures_exit=$?

          if [ "${measures_exit}" -eq 0 ]; then
            coverage="$(echo "${measures_response}" | jq -r '.component.measures[]? | select(.metric == "coverage") | .value' | head -n 1)"
            bugs="$(echo "${measures_response}" | jq -r '.component.measures[]? | select(.metric == "bugs") | .value' | head -n 1)"
            vulnerabilities="$(echo "${measures_response}" | jq -r '.component.measures[]? | select(.metric == "vulnerabilities") | .value' | head -n 1)"
            code_smells="$(echo "${measures_response}" | jq -r '.component.measures[]? | select(.metric == "code_smells") | .value' | head -n 1)"
          fi

          coverage="${coverage:-No disponible}"
          bugs="${bugs:-No disponible}"
          vulnerabilities="${vulnerabilities:-No disponible}"
          code_smells="${code_smells:-No disponible}"

          {
            echo "status=${status}"
            echo "summary=${summary}"
            echo "dashboard_url=${dashboard_url}"
            echo "coverage=${coverage}"
            echo "bugs=${bugs}"
            echo "vulnerabilities=${vulnerabilities}"
            echo "code_smells=${code_smells}"
          } >> "${GITHUB_OUTPUT}"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs:
      - build
      - deploy
      - sonarcloud
    if: always()
    steps:
      - name: Prepare Slack payload
        id: slack-payload
        shell: bash
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          REPOSITORY: ${{ github.repository }}
          REPOSITORY_URL: ${{ github.event.repository.html_url }}
          BRANCH_NAME: ${{ needs.build.outputs.branch_name || github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHORT_SHA: ${{ needs.build.outputs.short_sha || github.sha }}
          COMMIT_MESSAGE: ${{ needs.build.outputs.commit_message || github.event.head_commit.message || '' }}
          COMMIT_URL: ${{ needs.build.outputs.commit_url || github.event.head_commit.url || format('{0}/commit/{1}', github.event.repository.html_url, github.sha) }}
          ACTOR: ${{ github.triggering_actor || github.actor }}
          SONAR_STATUS: ${{ needs.sonarcloud.outputs.status || 'not_configured' }}
          SONAR_SUMMARY: ${{ needs.sonarcloud.outputs.summary || 'SonarCloud no configurado' }}
          SONAR_DASHBOARD_URL: ${{ needs.sonarcloud.outputs.dashboard_url || '' }}
          SONAR_COVERAGE: ${{ needs.sonarcloud.outputs.coverage || 'No disponible' }}
          SONAR_BUGS: ${{ needs.sonarcloud.outputs.bugs || 'No disponible' }}
          SONAR_VULNERABILITIES: ${{ needs.sonarcloud.outputs.vulnerabilities || 'No disponible' }}
          SONAR_CODE_SMELLS: ${{ needs.sonarcloud.outputs.code_smells || 'No disponible' }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const env = process.env;
          const buildResult = env.BUILD_RESULT || "unknown";
          const deployResult = env.DEPLOY_RESULT || "unknown";
          const successful = buildResult === "success" && deployResult === "success";
          const status = successful ? "Despliegue correcto" : `Despliegue fallido (build: ${buildResult}, deploy: ${deployResult})`;
          const executionColor = successful ? "#2eb67d" : "#e01e5a";
          const buildColor = buildResult === "success" ? "#2eb67d" : "#e01e5a";
          const deployColor = deployResult === "success" ? "#2eb67d" : "#e01e5a";
          const sonarStatus = env.SONAR_STATUS || "not_configured";
          const sonarColor = sonarStatus === "OK" ? "#2eb67d" : sonarStatus === "not_configured" ? "#ecb22e" : "#e01e5a";
          const shortSha = (env.SHORT_SHA || "").slice(0, 7) || "No disponible";

          const escapeSlack = (value, fallback = "No disponible") => {
            const text = value && String(value).trim() ? String(value).trim() : fallback;
            return text
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;");
          };

          const link = (url, label) => {
            const safeLabel = escapeSlack(label);
            return url && String(url).trim() ? `<${url}|${safeLabel}>` : safeLabel;
          };

          const payload = {
            text: `Deploy GitHub Pages: ${status} - ${env.REPOSITORY}`,
            attachments: [
              {
                color: executionColor,
                blocks: [
                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text: `*Workflow:* ${link(env.RUN_URL, "Deploy GitHub Pages")}\n*Estado:* ${escapeSlack(status)}`,
                    },
                  },
                  {
                    type: "section",
                    fields: [
                      {
                        type: "mrkdwn",
                        text: `*Repositorio:*\n${link(env.REPOSITORY_URL, env.REPOSITORY)}`,
                      },
                      {
                        type: "mrkdwn",
                        text: `*Rama:*\n${escapeSlack(env.BRANCH_NAME)}`,
                      },
                      {
                        type: "mrkdwn",
                        text: `*Evento:*\n${escapeSlack(env.EVENT_NAME)}`,
                      },
                      {
                        type: "mrkdwn",
                        text: `*Ejecucion:*\n#${escapeSlack(env.RUN_NUMBER)}`,
                      },
                      {
                        type: "mrkdwn",
                        text: `*Commit:*\n${link(env.COMMIT_URL, shortSha)}`,
                      },
                      {
                        type: "mrkdwn",
                        text: `*Usuario:*\n${escapeSlack(env.ACTOR)}`,
                      },
                    ],
                  },
                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text: `*Mensaje del commit:*\n${escapeSlack(env.COMMIT_MESSAGE)}`,
                    },
                  },
                  {
                    type: "actions",
                    elements: [
                      {
                        type: "button",
                        text: {
                          type: "plain_text",
                          text: "Ver ejecucion",
                        },
                        url: env.RUN_URL,
                      },
                      {
                        type: "button",
                        text: {
                          type: "plain_text",
                          text: "Ver commit",
                        },
                        url: env.COMMIT_URL,
                      },
                    ],
                  },
                ],
              },
              {
                color: buildColor,
                blocks: [
                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text: `*Build:* ${escapeSlack(buildResult)}`,
                    },
                  },
                ],
              },
              {
                color: deployColor,
                blocks: [
                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text: `*Deploy:* ${escapeSlack(deployResult)}`,
                    },
                  },
                ],
              },
              {
                color: sonarColor,
                blocks: [
                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text: `*SonarCloud:* ${link(env.SONAR_DASHBOARD_URL, sonarStatus)}\n*${escapeSlack(env.SONAR_SUMMARY)}`,
                    },
                  },
                  {
                    type: "section",
                    fields: [
                      {
                        type: "mrkdwn",
                        text: `*Cobertura:*\n${escapeSlack(env.SONAR_COVERAGE)}`,
                      },
                      {
                        type: "mrkdwn",
                        text: `*Bugs:*\n${escapeSlack(env.SONAR_BUGS)}`,
                      },
                      {
                        type: "mrkdwn",
                        text: `*Vulnerabilidades:*\n${escapeSlack(env.SONAR_VULNERABILITIES)}`,
                      },
                      {
                        type: "mrkdwn",
                        text: `*Code Smells:*\n${escapeSlack(env.SONAR_CODE_SMELLS)}`,
                      },
                    ],
                  },
                ],
              },
            ],
          };

          const payloadPath = path.join(env.RUNNER_TEMP, "slack-payload.json");
          fs.writeFileSync(payloadPath, JSON.stringify(payload, null, 2));
          fs.appendFileSync(env.GITHUB_OUTPUT, `payload-path=${payloadPath}\n`);
          NODE

      - name: Send Slack notification
        uses: slackapi/slack-github-action@dcb1066f776dd043e64d0e8ba94ca15cc7e1875d
        continue-on-error: true
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_PUBLIC_URL }}
          webhook-type: incoming-webhook
          payload-file-path: ${{ steps.slack-payload.outputs.payload-path }}
